<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Levent Programlama Dili</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #0f172a; 
            color: #f8fafc; 
            margin: 0; 
            padding: 0; 
            text-align: center; 
        }
        header { 
            padding: 80px 20px; 
            background: linear-gradient(135deg, #1e1b4b 0%, #311042 100%); 
        }
        h1 { 
            font-size: 3.5rem; 
            margin: 0; 
            color: #38bdf8; 
        }
        p { 
            font-size: 1.2rem; 
            color: #94a3b8; 
            max-width: 600px; 
            margin: 20px auto; 
        }
        .btn-download { 
            display: inline-block; 
            background-color: #38bdf8; 
            color: #0f172a; 
            padding: 15px 40px; 
            font-weight: bold; 
            font-size: 1.1rem; 
            text-decoration: none; 
            border-radius: 50px; 
            margin-top: 20px; 
            box-shadow: 0 4px 14px rgba(56, 189, 248, 0.4); 
            transition: 0.3s; 
        }
        .btn-download:hover { 
            transform: translateY(-3px); 
            background-color: #7dd3fc; 
        }
        .code-box { 
            background-color: #020617; 
            border: 1px solid #334155; 
            border-radius: 8px; 
            padding: 20px; 
            max-width: 500px; 
            margin: 40px auto; 
            text-align: left; 
            font-family: 'Courier New', Courier, monospace; 
            color: #34d399; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }
    </style>
</head>
<body>

    <header>
        <h1>Levent Programlama Dili</h1>
        <p>Hızlı, modüler ve geleceğin teknolojileri için optimize edilmiş yepyeni bir programlama dili deneyimi.</p>
        
        <a href="https://github.com/kaan1881/levent-lang" class="btn-download">Proje Kodlarını İncele</a>
    </header>

    <div class="code-box">
        <span style="color: #f43f5e;">fonksiyon</span> ana() {<br>
        &nbsp;&nbsp;&nbsp;&nbsp;yazdir(<span style="color: #e2e8f0;">"Merhaba Dünya!"</span>);<br>
        }
    </div>

</body>
</html>
